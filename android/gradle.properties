org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation.
# Reason: Kotlin's RelocatableFileToPathConverter crashes when the project and
# the Pub cache live on different drives (project is on D:, pub cache on C:).
# See https://youtrack.jetbrains.com/issue/KT-58594. The trade-off is a slightly
# slower no-cache compile each time, which is fine for a release-only quirk.
kotlin.incremental=false
