include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/src/l10n/gen/**"
  errors:
    invalid_annotation_target: ignore
    # very_good_analysis is strict; downgrade a few rules that would require
    # large mechanical changes across the existing codebase. Re-enable as
    # files get touched feature-by-feature.
    public_member_api_docs: ignore
    avoid_redundant_argument_values: warning
    use_if_null_to_convert_nulls_to_bools: warning
    cascade_invocations: warning
    avoid_positional_boolean_parameters: warning
    one_member_abstracts: warning
    flutter_style_todos: ignore
    lines_longer_than_80_chars: ignore
