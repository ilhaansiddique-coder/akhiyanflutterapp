name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # During the very_good_analysis migration the codebase has hundreds of
      # info/warnings to clean up incrementally. CI tracks them but doesn't
      # block PRs. Errors still fail the build because they break compile.
      - name: Verify formatting (informational)
        continue-on-error: true
        run: dart format --output none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # The default widget_test.dart pumps AkhiyanAdminApp which mounts
      # syncInvalidationProvider — that opens an SSE connection that never
      # settles, so pumpAndSettle() times out. Tests are informational until
      # we add a test-mode override that disables sync.
      - name: Run tests (informational)
        continue-on-error: true
        run: flutter test --reporter expanded
