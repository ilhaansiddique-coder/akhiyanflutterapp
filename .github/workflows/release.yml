name: Release APK to Firebase App Distribution

# Builds release APKs on every push to `main` and ships them to Firebase
# App Distribution under the `akhiyan-staff` tester group. Testers get an
# email + in-Firebase notification; tapping "Update" installs the new APK
# over the old one with no data loss (same package + signature).
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   FIREBASE_APP_ID            — "1:NNN:android:..." from Firebase project settings
#   FIREBASE_SERVICE_ACCOUNT   — full JSON of a service account with
#                                "Firebase App Distribution Admin" role
#   ANDROID_KEYSTORE_BASE64    — base64-encoded release keystore
#                                (`base64 -w0 release.keystore`)
#   ANDROID_KEYSTORE_PASSWORD  — keystore password
#   ANDROID_KEY_ALIAS          — key alias inside the keystore
#   ANDROID_KEY_PASSWORD       — alias password
#
# Without the keystore secrets the workflow falls back to debug-signed
# builds — fine for testing but Android refuses to install over a
# previously release-signed APK, so once you ship a real release-signed
# build you must keep using release signing forever.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the Actions tab

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    name: Build + ship to Firebase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # Optional: decode keystore from base64 secret. Skipped silently if
      # the secret is missing — release build will fall back to debug keys
      # which are fine for first-iteration testing.
      - name: Decode release keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=app/release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # Build a single universal APK for App Distribution. Split-per-abi
      # APKs are smaller per file but App Distribution only accepts one
      # binary per release, so we ship the universal one (~15-20 MB more
      # than per-ABI but trivially small for staff distribution).
      - name: Build release APK
        run: flutter build apk --release

      - name: Generate release notes from commits
        id: notes
        run: |
          # Last 10 commit subjects since previous tag (or all if no tags).
          # Falls back to the latest commit if `git log` returns nothing.
          NOTES=$(git log --no-merges --pretty=format:"- %s" -n 10 || echo "- ${{ github.event.head_commit.message }}")
          # Escape newlines for the action's multiline output.
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: akhiyan-staff
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: ${{ steps.notes.outputs.notes }}

      - name: Upload APK as workflow artifact
        # Mirror the APK to GitHub Actions artifacts so it's downloadable
        # even if the Firebase upload fails for any reason.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
